apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# THIN SCAFFOLD -- renders successfully (`kubectl kustomize` this
# directory) but is NOT deployable as-is. See README.md in this directory
# for the full list of what's still missing (real DATABASE_URL/KAFKA_BROKERS/
# etc, a jwt-secret, a real image registry, Ingress host/class). Compare
# with ../dev, which is fully wired and actually deployable today.

namespace: edp-prod

resources:
  - ../../base
  - namespace.yaml

# Modest horizontal bump over base's single replica -- not load-tested,
# just "more than one so a single pod restart isn't a full outage". One
# more than staging as a starting point; revisit once there's real traffic
# data to size against.
replicas:
  - name: auth-service
    count: 3
  - name: company-service
    count: 3
  - name: rbac-service
    count: 3
  - name: audit-service
    count: 3
  - name: api-gateway
    count: 3
  - name: finance-service
    count: 3
  - name: hr-service
    count: 3
  - name: sales-service
    count: 3
  - name: purchasing-service
    count: 3
  - name: warehouse-service
    count: 3
  - name: production-service
    count: 3
  - name: qc-service
    count: 3
  - name: asset-service
    count: 3
  - name: ai-bi-service
    count: 3
  - name: dw-service
    count: 3
  - name: frontend
    count: 3

# Deliberately NOT included here (see README.md for why): configMapGenerator
# overrides for DATABASE_URL/KAFKA_BROKERS/REDIS_URL/CLICKHOUSE_URL/APP_ENV/
# CORS_ALLOWED_ORIGIN, a jwt-secret secretGenerator, an images: transformer
# pointing at a real registry, and an Ingress host/class patch.
