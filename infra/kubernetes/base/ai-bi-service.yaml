apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-bi-service
  labels:
    app: ai-bi-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-bi-service
  template:
    metadata:
      labels:
        app: ai-bi-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8093"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: ai-bi-service
          image: REPLACE_ME_REGISTRY/ai-bi-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8093
          envFrom:
            - configMapRef:
                # No DATABASE_URL/KAFKA_BROKERS here -- ai-bi-service has no
                # database of its own, pure live HTTP aggregation from the
                # other 8 services (see internal/httpapi/summary.go).
                name: ai-bi-service-config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8093
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8093
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-bi-service
  labels:
    app: ai-bi-service
spec:
  selector:
    app: ai-bi-service
  ports:
    - port: 8093
      targetPort: 8093
