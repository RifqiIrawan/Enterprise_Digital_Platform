apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8079"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api-gateway
          image: REPLACE_ME_REGISTRY/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8079
          envFrom:
            - configMapRef:
                name: api-gateway-config
            - secretRef:
                # Must be identical to auth-service's jwt-secret (gateway
                # verifies the tokens auth-service signs) -- see the
                # matching note in auth-service.yaml.
                name: jwt-secret
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8079
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8079
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8079
      targetPort: 8079
