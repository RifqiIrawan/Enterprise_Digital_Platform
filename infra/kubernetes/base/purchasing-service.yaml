apiVersion: apps/v1
kind: Deployment
metadata:
  name: purchasing-service
  labels:
    app: purchasing-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: purchasing-service
  template:
    metadata:
      labels:
        app: purchasing-service
    spec:
      containers:
        - name: purchasing-service
          image: REPLACE_ME_REGISTRY/purchasing-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8088
          envFrom:
            - configMapRef:
                name: purchasing-service-config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8088
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8088
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: purchasing-service
  labels:
    app: purchasing-service
spec:
  selector:
    app: purchasing-service
  ports:
    - port: 8088
      targetPort: 8088
