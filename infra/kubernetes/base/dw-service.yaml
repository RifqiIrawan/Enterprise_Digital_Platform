apiVersion: apps/v1
kind: Deployment
metadata:
  name: dw-service
  labels:
    app: dw-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dw-service
  template:
    metadata:
      labels:
        app: dw-service
    spec:
      containers:
        - name: dw-service
          image: REPLACE_ME_REGISTRY/dw-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8095
          envFrom:
            - configMapRef:
                name: dw-service-config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8095
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8095
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: dw-service
  labels:
    app: dw-service
spec:
  selector:
    app: dw-service
  ports:
    - port: 8095
      targetPort: 8095
