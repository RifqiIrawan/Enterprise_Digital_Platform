name: Backend CI

on:
  push:
    branches: [master]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [master]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # Only used by modules/dw-service's tests (internal/etl), which SKIP
      # (exit 0, not fail) if this is unreachable -- see
      # internal/etl/testmain_test.go. Every other matrix leg simply ignores
      # this service. Port 9101 (native protocol) matches the host remap in
      # infra/docker-compose.yml and dw-service's own CLICKHOUSE_ADDR default.
      clickhouse:
        image: clickhouse/clickhouse-server:24.3
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: clickhouse
        ports:
          - 9101:9000
          - 8123:8123
      # Also only used by modules/dw-service (internal/datalake and the
      # lake_test.go dual-write test), same SKIP-if-unreachable pattern as
      # clickhouse above. bitnamilegacy/minio (not minio/minio) specifically
      # -- GitHub Actions' `services:` block has no way to override a
      # container's CMD, and the official minio/minio image needs an
      # explicit `server /data` argument or it just prints help and exits;
      # Bitnami's entrypoint runs the server directly from its own default
      # CMD, no argument override needed (same reasoning as
      # bitnamilegacy/kafka in infra/docker-compose.yml, verified locally
      # before use here).
      minio:
        image: bitnamilegacy/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9004:9000

    strategy:
      fail-fast: false
      matrix:
        service:
          - services/api-gateway
          - services/auth-service
          - services/company-service
          - services/rbac-service
          - services/audit-service
          - modules/finance-service
          - modules/hr-service
          - modules/sales-service
          - modules/purchasing-service
          - modules/warehouse-service
          - modules/production-service
          - modules/qc-service
          - modules/asset-service
          - modules/ai-bi-service
          - modules/dw-service
          - modules/iot-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.work
          cache-dependency-path: backend/${{ matrix.service }}/go.sum

      # Each service is built/vetted/tested from inside its own directory
      # (not `go build ./...` from backend/, the go.work root) because Go's
      # workspace-mode pattern matching only expands `./...` for directories
      # that are themselves a `use`-d module -- `backend/` itself isn't one,
      # so `./...` from there fails to resolve. Running from inside each
      # service dir also mirrors how the README already tells developers to
      # run these services (`cd backend/services/auth-service && go run
      # ./cmd/server`), and workspace mode still applies (shared dependency
      # versions come from backend/go.work), it just scopes the pattern to
      # this one module.
      - name: Build
        working-directory: backend/${{ matrix.service }}
        run: go build ./...

      - name: Vet
        working-directory: backend/${{ matrix.service }}
        run: go vet ./...

      - name: Test
        working-directory: backend/${{ matrix.service }}
        # Services with Postgres-backed integration tests (the 8 Fase 2
        # modules plus iot-service, all other than ai-bi-service) connect to
        # the service container above via localhost:5432, matching each
        # TestMain's default admin URL (postgres://platform:platform@
        # localhost:5432/postgres) and creating their own {service}_test
        # database. ai-bi-service and the Fase 1 services (auth/company/
        # rbac/audit/api-gateway) don't touch Postgres in tests (or have
        # none yet) -- `go test ./...` is a no-op pass for those. dw-service
        # is the odd one out: it needs Postgres (localhost:5432, same
        # as the other modules), the clickhouse service above
        # (localhost:9101) for its internal/etl tests -- see
        # testmain_test.go -- and the minio service above (localhost:9004)
        # for internal/datalake's tests and the lake_test.go dual-write
        # test (every other internal/etl test passes lake=nil, MinIO is a
        # best-effort side-channel, not a hard dependency for the rest of
        # the fact-table tests). iot-service's MQTT/simulator code isn't
        # touched by its tests at all (only internal/httpapi + internal/
        # ingest, both pure Postgres), so no mosquitto service is needed here.
        run: go test ./... -v
