name: Frontend CI

on:
  push:
    branches: [master]
    paths:
      - "frontend/web/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [master]
    paths:
      - "frontend/web/**"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/web/package-lock.json

      - name: Install dependencies
        working-directory: frontend/web
        run: npm ci

      # `npm run lint` is intentionally not run here: the repo has never
      # had an ESLint config file (checked full git history), so the
      # existing `lint` script fails immediately with "couldn't find a
      # configuration file" -- that's a pre-existing gap, not something
      # this workflow should paper over or silently fix by adding new
      # eslint-plugin-* dependencies. Flagged separately; add this step
      # back once a config exists.

      - name: Build
        working-directory: frontend/web
        run: npm run build
